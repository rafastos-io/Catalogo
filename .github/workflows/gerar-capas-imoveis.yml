name: Gerar Capas Imóveis

on:
  schedule:
    - cron: '10 22 * * *'   # 22:10 UTC = 19:10 BRT, todo dia (após Sync 19:00)
  workflow_dispatch:
    inputs:
      limit:
        description: 'Limit (dry-run, 0 = todos)'
        required: false
        default: '0'
      concurrency:
        description: 'Concurrency (renders paralelos)'
        required: false
        default: '10'
      force:
        description: 'Force (regerar tudo)'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  capas:
    name: Gerar capas 1080x1080 e subir via SFTP
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar Chrome (Puppeteer)
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
          install-dependencies: true

      - name: Chrome path
        run: |
          echo "PUPPETEER_EXECUTABLE_PATH=$(which google-chrome || which google-chrome-stable)" >> $GITHUB_ENV
          google-chrome --version || google-chrome-stable --version

      - name: Instalar dependências
        run: npm ci

      - name: Popular content_hash (garante incremental correto)
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: npm run popular-content-hash

      - name: Gerar capas
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          STORAGE_SFTP_HOST: ${{ secrets.STORAGE_SFTP_HOST }}
          STORAGE_SFTP_PORT: ${{ secrets.STORAGE_SFTP_PORT }}
          STORAGE_SFTP_USER: ${{ secrets.STORAGE_SFTP_USER }}
          STORAGE_SFTP_PASS: ${{ secrets.STORAGE_SFTP_PASS }}
          STORAGE_PUBLIC_URL: ${{ secrets.STORAGE_PUBLIC_URL }}
          STORAGE_REMOTE_DIR: ${{ secrets.STORAGE_REMOTE_DIR }}
          STORAGE_POOL_SIZE: '5'
        run: |
          ARGS="--concurrency=${{ github.event.inputs.concurrency || '10' }}"
          if [ "${{ github.event.inputs.limit || '0' }}" != "0" ]; then
            ARGS="$ARGS --limit=${{ github.event.inputs.limit }}"
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          npm run capas:imoveis -- $ARGS
